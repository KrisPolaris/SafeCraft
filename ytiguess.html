<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>jutjub</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: sans-serif;
            font-size: 14px;
        }
        
        #header {
            background-color: #e50914;
            padding: 10px;
            text-align: left;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        
        #logo {
            font-weight: bold;
            font-size: 18px;
            color: #ffffff;
            display: inline-block;
            margin-right: 10px;
            cursor: pointer;
        }

        #search-box {
            padding: 10px;
            background-color: #1c1c1c;
            text-align: center;
        }
        
        #search-input {
            width: 60%;
            padding: 6px;
            border: 1px solid #444;
            background-color: #333;
            color: #fff;
            font-size: 14px;
            border-radius: 4px;
        }
        
        #search-button {
            width: 28%;
            padding: 6px;
            background-color: #e50914;
            color: #fff;
            border: none;
            font-weight: bold;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
        }

        #filter-box {
            background-color: #1c1c1c;
            padding: 5px 10px 10px 10px;
            text-align: center;
            border-bottom: 1px solid #2d2d2d;
        }

        .filter-btn {
            background-color: #333;
            color: #fff;
            border: none;
            padding: 5px 15px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        #player-container {
            display: none;
            background-color: #000;
            padding: 5px;
            text-align: center;
        }
        
        #video-player {
            width: 100%;
            height: 200px;
            border: none;
            transition: height 0.3s ease;
        }

        /* Klasa zmieniająca odtwarzacz w pionowy dla Shortsów */
        #video-player.shorts-player {
            width: 70%;
            height: 450px;
            max-width: 320px;
            margin: 0 auto;
        }

        #video-list {
            padding: 10px;
        }
        
        /* Klasyczny wygląd filmów */
        .video-item {
            display: block;
            background-color: #1e1e1e;
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 6px;
            text-decoration: none;
            color: #ffffff;
            border: 1px solid #2d2d2d;
        }
        
        .video-item:active {
            background-color: #333333;
        }
        
        .thumbnail-container {
            width: 120px;
            float: left;
            margin-right: 10px;
        }
        
        .thumbnail {
            width: 120px;
            height: 90px;
            background-color: #000;
            display: block;
            border-radius: 4px;
            object-fit: cover;
        }

        /* NOWOŚĆ: Pionowy układ kafelków (Grid) specjalnie dla Shortsów */
        .shorts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 10px;
        }

        .shorts-grid .video-item {
            display: flex;
            flex-direction: column;
            margin-bottom: 0;
            padding: 6px;
        }

        .shorts-grid .thumbnail-container {
            width: 100%;
            float: none;
            margin-right: 0;
            margin-bottom: 6px;
        }

        .shorts-grid .thumbnail {
            width: 100%;
            height: 210px; /* Wysoka, pionowa miniatura */
        }

        /* Styl dla zastępczego awatara kanału */
        .channel-avatar-fallback {
            width: 80px;
            height: 80px;
            background-color: #444;
            color: #fff;
            border-radius: 50%;
            text-align: center;
            line-height: 80px;
            font-size: 32px;
            font-weight: bold;
            margin: 5px auto;
        }
        
        .video-info {
            overflow: hidden;
        }
        
        .video-title {
            font-weight: bold;
            font-size: 13px;
            line-height: 1.3;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .video-author {
            color: #aaa;
            font-size: 11px;
        }
        
        .clear {
            clear: both;
        }
        
        #status-message {
            text-align: center;
            padding: 20px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div id="header">
    <span id="logo" onclick="loadTrending();">Jutjub</span>
</div>

<div id="search-box">
    <div style="display: block;">
        <input type="text" id="search-input" placeholder="Wpisz @nazwa lub #shorts..." value="Minecraft">
        <button type="button" id="search-button" onclick="searchVideos();">Search</button>
    </div>
</div>

<div id="filter-box">
    <button class="filter-btn" onclick="loadTrending()">🔥 Odkrywaj popularne</button>
</div>

<div id="player-container">
    <iframe id="video-player" src="" allowfullscreen></iframe>
    <div id="playing-title" style="padding: 8px; font-weight: bold; font-size: 12px; text-align: left;"></div>
</div>

<div id="video-list">
    <div id="status-message">Ładowanie strony głównej...</div>
</div>

<script type="text/javascript">
    var apiInstances = [
        "https://yewtu.be",
        "https://inv.tux.digital",
        "https://invidious.flokinet.to",
        "https://iv.melmac.space"
    ];
    var currentInstanceIndex = 0;
    var isTrendingMode = false;
    var isShortsMode = false; // Nowa zmienna wykrywająca tryb Shorts
    var currentType = "video";

    window.onload = function() {
        loadTrending();
    };

    function loadTrending() {
        isTrendingMode = true;
        isShortsMode = false;
        currentType = "video"; 
        
        // Reset wyglądu listy i playera do zwykłego trybu
        document.getElementById("video-list").className = "";
        document.getElementById("video-player").className = "";
        
        var listContainer = document.getElementById("video-list");
        listContainer.innerHTML = '<div id="status-message">Ładowanie sekcji Odkrywaj...</div>';
        
        var instance = apiInstances[currentInstanceIndex];
        var apiUrl = instance + "/api/v1/trending?region=PL";
        
        makeRequest(apiUrl);
    }

    function searchVideos() {
        isTrendingMode = false;
        isShortsMode = false;
        
        // Reset klas na start wyszukiwania
        document.getElementById("video-list").className = "";
        document.getElementById("video-player").className = "";
        
        var query = document.getElementById("search-input").value;
        var listContainer = document.getElementById("video-list");
        
        if (!query) {
            alert("Wpisz coś do wyszukiwarki!");
            return;
        }
        
        listContainer.innerHTML = '<div id="status-message">Loading...</div>';
        
        // 1. Wykrywanie sekretnych haseł lub znaku #
        var cleanQuery = query.trim().toUpperCase();
        if (query.charAt(0) === '#') {
            isShortsMode = true;
            currentType = "video";
            // Zmieniamy np. #minecraft na "minecraft shorts", żeby API znalazło odpowiednie filmy
            query = query.substring(1) + " shorts";
        } else if (cleanQuery === "CHECK THE SOUND" || cleanQuery === "DONT CHECK THE SOUND") {
            isShortsMode = true;
            currentType = "video";
            query = query + " shorts";
        } else if (query.charAt(0) === '@') {
            currentType = "channel";
            query = query.substring(1);
        } else {
            currentType = "video";
        }
        
        // Włączamy pionowy siatkowy układ (grid) jeśli to Shortsy
        if (isShortsMode) {
            listContainer.className = "shorts-grid";
        }
        
        var instance = apiInstances[currentInstanceIndex];
        var apiUrl = instance + "/api/v1/search?q=" + encodeURIComponent(query) + "&type=" + currentType;
        
        makeRequest(apiUrl);
    }

    function makeRequest(url) {
        var xhr = new XMLHttpRequest();
        xhr.open("GET", url, true);
        
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    try {
                        var data = JSON.parse(xhr.responseText);
                        renderResults(data);
                    } catch(e) {
                        handleFallback();
                    }
                } else {
                    handleFallback();
                }
            }
        };
        xhr.send();
    }

    function handleFallback() {
        currentInstanceIndex++;
        if (currentInstanceIndex < apiInstances.length) {
            if (isTrendingMode) {
                loadTrending();
            } else {
                searchVideos();
            }
        } else {
            currentInstanceIndex = 0;
            document.getElementById("video-list").innerHTML = '<div id="status-message" style="color:#ff3333;">Błąd połączenia. Spróbuj ponownie!</div>';
        }
    }

    function renderResults(data) {
        var listContainer = document.getElementById("video-list");
        
        if (!data || data.length === 0) {
            listContainer.innerHTML = '<div id="status-message">Brak wyników.</div>';
            return;
        }
        
        var html = "";
        
        for (var i = 0; i < data.length; i++) {
            var item = data[i];
            
            if (currentType === "channel" && item.type === "channel") {
                var firstLetter = item.author ? item.author.charAt(0).toUpperCase() : "?";
                
                html += '<div class="video-item" onclick="document.getElementById(\'search-input\').value=\'' + escapeHtml(item.author) + '\'; searchVideos();">';
                html += '  <div class="thumbnail-container">';
                html += '    <div class="channel-avatar-fallback">' + firstLetter + '</div>';
                html += '  </div>';
                html += '  <div class="video-info" style="padding-top: 20px;">';
                html += '    <div class="video-title" style="font-size: 15px;">' + item.author + '</div>';
                html += '    <div class="video-author">' + (item.subCount ? item.subCount + ' subskrybentów' : 'Kanał') + '</div>';
                html += '  </div>';
                html += '  <div class="clear"></div>';
                html += '</div>';
            } 
            else if (item.videoId) {
                var thumbUrl = "";
                if (item.videoThumbnails && item.videoThumbnails.length > 0) {
                    thumbUrl = item.videoThumbnails[0].url;
                }
                
                html += '<div class="video-item" onclick="playVideo(\'' + item.videoId + '\', \'' + escapeHtml(item.title) + '\')">';
                html += '  <div class="thumbnail-container">';
                html += '    <img class="thumbnail" src="' + thumbUrl + '">';
                html += '  </div>';
                html += '  <div class="video-info">';
                html += '    <div class="video-title">' + item.title + '</div>';
                html += '    <div class="video-author">' + item.author + '</div>';
                html += '  </div>';
                html += '  <div class="clear"></div>';
                html += '</div>';
            }
        }
        
        listContainer.innerHTML = html;
    }

    function playVideo(id, title) {
        var playerContainer = document.getElementById("player-container");
        var iframe = document.getElementById("video-player");
        var titleContainer = document.getElementById("playing-title");
        
        // Jeśli jesteśmy w trybie Shorts, nadajemy odtwarzaczowi pionowy styl
        if (isShortsMode) {
            iframe.className = "shorts-player";
        } else {
            iframe.className = "";
        }
        
        iframe.src = "https://www.youtube.com/embed/" + id + "?autoplay=1&controls=1";
        titleContainer.innerHTML = title;
        
        playerContainer.style.display = "block";
        window.scrollTo(0, 0);
    }

    function escapeHtml(text) {
        if (!text) return "";
        return text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "\\'");
    }
</script>

</body>
</html>
